<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMS ERP — Administration</title>
<style>
:root{--navy:#14253D;--navy2:#1B3050;--navy3:#27425F;--gold:#B68A3A;--golddk:#9A7430;--ink:#2E3338;--steel:#8C97A4;--pale:#F4F6F8;--line:#DDE3EA;--white:#fff;--radius:12px;--shadow:0 1px 3px rgba(20,37,61,.10),0 1px 2px rgba(20,37,61,.06);}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,Helvetica,sans-serif;color:var(--ink);background:var(--pale);font-size:14px;line-height:1.45}
button{font-family:'Inter',Arial,Helvetica,sans-serif;cursor:pointer}
.topbar{display:flex;align-items:center;gap:14px;background:var(--navy);color:#fff;padding:9px 18px;position:sticky;top:0;z-index:30}
.brand{font-size:20px;font-weight:800}.brand .erp{color:var(--gold)}
.topbar .crumb{font-size:12px;color:#aebacb}
.wrap{max-width:1020px;margin:0 auto;padding:34px 22px}
h1{font-size:22px;color:var(--navy);margin:0}
.purpose{font-size:12.5px;color:var(--steel);margin:6px 0 24px}
.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:860px){.choice-grid{grid-template-columns:1fr}}
.choice{display:flex;flex-direction:column;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px;text-align:left;font:inherit;color:var(--ink);border-bottom:3px solid transparent;transition:border-color .12s,box-shadow .12s,transform .12s}
.choice:hover{border-color:var(--navy);border-bottom-color:var(--gold);box-shadow:0 4px 16px rgba(20,37,61,.14);transform:translateY(-2px)}
.choice .icon{width:46px;height:46px;border-radius:11px;background:var(--pale);border:1px solid var(--line);display:grid;place-items:center;font-size:21px}
.choice:hover .icon{background:var(--navy)}
.choice .t{font-size:15.5px;font-weight:800;color:var(--navy)}
.choice .d{font-size:12.5px;color:var(--steel);line-height:1.55;flex:1}
.choice .go{font-size:12.5px;font-weight:800;color:var(--navy)}
.choice:hover .go{color:var(--golddk)}
.note{margin-top:26px;background:#fff;border:1px dashed var(--gold);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--golddk)}
.note b{color:var(--navy)}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">DMS <span class="erp">ERP</span></div>
  <div class="crumb">Administration</div>
</div>
<div class="wrap">
  <h1>Administration</h1>
  <div class="purpose">Administrative controls and approvals. Choose a screen below — the form is unchanged; it now lives under this one door.</div>
  <div class="choice-grid">
    <button class="choice" type="button" onclick="go('13_Review_Approve.html','Review & Approve')">
      <span class="icon"></span>
      <span class="t">Review &amp; Approve</span>
      <span class="d">Review pending records and approve or reject submissions across the ERP — the sign-off queue for the team.</span>
      <span class="go">Open Review &amp; Approve →</span>
    </button>
    <button class="choice" type="button" onclick="go('24_Price_Editor.html','Price Editor')">
      <span class="icon"></span>
      <span class="t">Price Editor</span>
      <span class="d">Edit the rate book per segment — services, options, quantities, prices, common items and percentages. Save to publish prices to the Pricing Formula.</span>
      <span class="go">Open Price Editor →</span>
    </button>
  </div>
  <div class="note"><b>Tip:</b> more administrative screens will land here — this is the home for approvals and back-office controls.</div>
</div>
<script>
function go(src,name){
  var inShell=false;
  try{inShell = window.parent && window.parent!==window;}catch(e){}
  if(inShell){
    try{parent.postMessage({dms:'open',src:src,name:name},'*');return;}catch(e){}
  }
  location.href=src;
}
</script>
<script src="sbx_annotate.js"></script>
</body>
</html>
